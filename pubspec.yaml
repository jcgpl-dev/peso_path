name: peso_path
description: PesoPath - budgeting app."
version: 1.0.1+2

environment:
  sdk: ^3.10.7

dependencies:
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  equatable: ^2.0.8
  get_it: ^9.2.1
  injectable: ^3.0.0
  path: ^1.9.1
  sqflite: ^2.4.2+1
  sqflite_common_ffi: ^2.4.0+3
  go_router: ^17.3.0
  intl: ^0.20.2
  uuid: ^4.5.3
  shared_preferences: ^2.5.5
  cupertino_icons: ^1.0.8
  image_picker: ^1.2.2
  url_launcher: ^6.3.2
  font_awesome_flutter: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - lib/assets/images/
    - lib/assets/icons/
    - lib/assets/fonts/
    - lib/assets/fonts/inter/
    - lib/assets/fonts/outfit/

  fonts:
    - family: Inter
      fonts:
        - asset: lib/assets/fonts/inter/Inter-Regular.ttf

        - asset: lib/assets/fonts/inter/Inter-Medium.ttf
          weight: 500

        - asset: lib/assets/fonts/inter/Inter-SemiBold.ttf
          weight: 600

        - asset: lib/assets/fonts/inter/Inter-Bold.ttf
          weight: 700
    - family: Outfit
      fonts:
        - asset: lib/assets/fonts/outfit/Outfit-Bold.ttf
          weight: 700
